---
bugfixes: # do not care to call CI work a major/minor change
  - Simplified pre-commit workflow to directly invoke pre-commit/action instead of delegating to external tooling.
  - Added sanity test workflow using ansible/ansible-content-actions.
  - Added build-import workflow using ansible/ansible-content-actions.
  - Added changelog validation workflow using ansible/ansible-content-actions.
  - Removed update_pre_commit.yml workflow in favor of Dependabot.
  - Replaced complex CI/CD workflows that delegated to ansible_collections_tooling with simplified, self-contained GitHub Actions workflows.
  - Replaced release_auto.yml with a fully inlined workflow covering version calculation, changelog generation, GitHub release, Galaxy/Automation Hub publishing, EE build, and Matrix notifications.
  - Added Dependabot configuration for automated updates of GitHub Actions, pip dependencies, and pre-commit hooks.

bugfixes:
  - Fixed controller_export_diff module to handle missing ControllerAWXKitModule gracefully, preventing NameError during sanity tests.
  - Fixed YAML quoting in filetree_create role task names to resolve ansible-lint load-failure errors.
  - Fixed markdown table alignment (MD060) across all role README files and the top-level README.
  - Fixed black formatting issues in controller_export_diff and controller_object_diff modules.
  - Added sanity ignore file for ansible-core 2.19 (devel) to skip line-endings check on docs/aap_config_as_code_public_meeting.ics.
...
